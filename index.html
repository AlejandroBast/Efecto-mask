<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro Bast</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cursor-dot"  id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <section class="hero-section">

    <div class="hero-earth-wrap">
      <div class="scene" id="scene">

        <div class="orbit-layer orbit-1" id="orbit1">
          <div class="orbit-dot-wrap"><span class="orbit-dot"></span></div>
          <div class="orbit-dot-wrap"><span class="orbit-dot"></span></div>
          <div class="orbit-dot-wrap"><span class="orbit-dot"></span></div>
        </div>
        <div class="orbit-layer orbit-2" id="orbit2">
          <div class="orbit-dot-wrap"><span class="orbit-dot"></span></div>
          <div class="orbit-dot-wrap"><span class="orbit-dot"></span></div>
          <div class="orbit-dot-wrap"><span class="orbit-dot"></span></div>
        </div>

        <div class="hero-earth-inner" id="earthInner">
          <img class="hero-earth-bg"    id="imgBlue"    src="Assets/hero-item.png" alt="esfera de abajo">
          <img class="hero-earth-hover" id="earthHover" src="Assets/hero-item-hover.png" alt="Esfera de arriba (hover)">
        </div>

      </div>
    </div>

    <div class="hero-gradient"></div>

  </section>

  <script src="script.js"></script>

</body>
</html>
